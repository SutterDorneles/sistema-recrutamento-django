{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ✅ RESOLUÇÃO DO WHATSAPP: Configuração do Card de Compartilhamento -->
    <title>{% block title %}Trabalhe Conosco | RH ORI{% endblock %}</title>
    <meta property="og:title" content="Trabalhe Conosco - RH ORI">
    <meta property="og:description" content="Encontre sua próxima oportunidade profissional em nosso portal de vagas.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:image" content="https://www.rhori.com.br/static/vagas/images/logo.jpg"> <!-- Certifique-se que este link da logo funciona publicamente -->

    <!-- Fontes Modernas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <link rel="icon" href="{% static 'vagas/images/favicon.png' %}" type="image/png">

    <style>
        :root {
            --cor-primaria: #005A9C;
            --cor-primaria-light: #3b82f6;
            --cor-fundo: #f8fafc;
            --cor-texto-bold: #1e293b;
            --cor-texto-corpo: #64748b;
            --cor-branca: #ffffff;
            --radius: 16px;
            --sombra-premium: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto-corpo);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Container Principal com Estilo Card Premium */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 40px;
            background-color: var(--cor-branca);
            border-radius: var(--radius);
            box-shadow: var(--sombra-premium);
            border: 1px solid rgba(226, 232, 240, 0.8);
            flex-grow: 1;
            width: 95%;
            box-sizing: border-box;
        }

        /* Header Modernizado */
        .site-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f1f5f9;
        }

        .site-header img {
            height: 80px;
            border-radius: 12px;
            transition: transform 0.3s ease;
        }
        
        .site-header img:hover {
            transform: scale(1.05);
        }

        .header-text h1 {
            margin: 0;
            color: var(--cor-texto-bold);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .header-text h2 {
            margin: 4px 0 0 0;
            font-weight: 500;
            color: var(--cor-texto-corpo);
            font-size: 1.1rem;
        }

        /* Estilo para Botões Modernos */
        .btn {
            background: linear-gradient(135deg, var(--cor-primaria) 0%, #003d6b 100%);
            color: white !important;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 90, 156, 0.2);
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 90, 156, 0.3);
            text-decoration: none !important;
        }

        /* Mensagens de Alerta */
        .message {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .message.error { background-color: #fef2f2; color: #991b1b; border: 1px solid #fee2e2; }
        .message.success { background-color: #f0fdf4; color: #166534; border: 1px solid #dcfce7; }

        /* Rodapé */
        footer {
            text-align: center;
            padding: 40px 0;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        footer a { color: #64748b; font-weight: 600; }

        /* Responsividade */
        @media (max-width: 600px) {
            .container { padding: 24px; margin: 20px auto; }
            .site-header { flex-direction: column; text-align: center; }
            .header-text h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="site-header">
            <img src="{% static 'vagas/images/logo.jpg' %}" alt="Logo RH ORI">
            <div class="header-text">
                <h1>RH<span style="color: var(--cor-primaria)">ORI</span></h1>
                <h2>Conectando talentos a grandes oportunidades</h2>
            </div>
        </header>

        {% if messages %}
            <div class="messages-container">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">
                        <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}        
        
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <p>&copy; {% now "Y" %} - RH ORI | <a href="{% url 'admin:index' %}"><i class="fas fa-lock"></i> Painel Administrativo</a></p>
    </footer>
</body>
</html>
